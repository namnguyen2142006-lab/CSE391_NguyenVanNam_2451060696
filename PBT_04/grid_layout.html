<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>B3 - Grid E-Commerce Layout</title>
    <link rel="stylesheet" href="grid.css" />
  </head>
  <body>
    <div class="page-layout">
      <header class="header">HEADER</header>

      <section class="hero">HERO BANNER</section>

      <aside class="sidebar">
        <h2>Filters</h2>

        <label>
          <input type="checkbox" />
          Electronics
        </label>

        <label>
          <input type="checkbox" />
          Fashion
        </label>

        <label>
          <input type="checkbox" />
          Shoes
        </label>

        <label>
          <input type="checkbox" />
          Accessories
        </label>
      </aside>

      <main class="main-content">
        <h2>Products</h2>

        <div class="product-grid">
          <article class="card featured">
            <div class="image">Image</div>
            <h3>Product 1</h3>
            <p>$19.99</p>
          </article>

          <article class="card">
            <div class="image">Image</div>
            <h3>Product 2</h3>
            <p>$24.99</p>
          </article>

          <article class="card">
            <div class="image">Image</div>
            <h3>Product 3</h3>
            <p>$29.99</p>
          </article>

          <article class="card">
            <div class="image">Image</div>
            <h3>Product 4</h3>
            <p>$34.99</p>
          </article>

          <article class="card">
            <div class="image">Image</div>
            <h3>Product 5</h3>
            <p>$39.99</p>
          </article>

          <article class="card">
            <div class="image">Image</div>
            <h3>Product 6</h3>
            <p>$44.99</p>
          </article>
        </div>
      </main>

      <aside class="ads">
        <h2>Advertisement</h2>

        <div class="ad-banner">AD BANNER</div>
      </aside>

      <footer class="footer">FOOTER</footer>
    </div>
  </body>
</html>
