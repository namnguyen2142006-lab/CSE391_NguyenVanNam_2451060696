<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Selectors Test</title>
    <style>
      h1 {
        color: red;
      }
      .price {
        color: rgb(249, 138, 206);
        font-weight: bold;
      }
      #app header {
        border: 2px dashed green;
        padding: 10px;
      }
      nav a:first-child {
        background-color: yellow;
      }
      .product.featured h2 {
        text-decoration: underline;
        color: purple;
      }
      article > p {
        font-style: italic;
      }
      a[href="/"] {
        border: 1px solid black;
        padding: 2px;
      }
      .top-bar.dark h1 {
        background-color: rgb(18, 15, 15);
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header class="top-bar dark">
        <h1>ShopTLU</h1>
        <nav>
          <a href="/" class="active">Home</a>
          <a href="/products">Products</a>
          <a href="/about">About</a>
        </nav>
      </header>
      <main>
        <article class="product">
          <h2>iPhone 16</h2>
          <p class="price">25.990.000đ</p>
          <p>Mô tả sản phẩm...</p>
        </article>
        <article class="product featured">
          <h2>MacBook Pro</h2>
          <p class="price">45.990.000đ</p>
          <p>Mô tả sản phẩm...</p>
        </article>
      </main>
    </div>
  </body>
</html>
