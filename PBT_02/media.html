<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jack J97</title>
  </head>
  <body>
    <header>
      <h1>Jack J97</h1>

      <svg
        width="100"
        height="100"
        viewBox="0 0 100 100"
        xmlns="http://www.w3.org/2000/svg"
      >
        <circle cx="50" cy="50" r="40" fill="orange"></circle>
      </svg>
    </header>

    <hr />

    <section>
      <h2>Jack J97 Comeback</h2>
      <h3>Bài hát: Thiên Lý Ơi</h3>

      <audio controls>
        <source src="background-music.mp3" type="audio/mpeg" />
        <source src="background-music.ogg" type="audio/ogg" />
      </audio>
    </section>

    <hr />

    <section>
      <h2>Concert của Jack J97</h2>

      <figure>
        <img
          src="jack1.jpg"
          alt="Jack J97 biểu diễn trên sân khấu"
          loading="lazy"
          style="max-width: 100%; height: auto"
        />
        <figcaption>Jack J97 biểu diễn live trên sân khấu</figcaption>
      </figure>

      <figure>
        <img
          src="jack2.jpg"
          alt="Jack J97 tại sự kiện âm nhạc"
          loading="lazy"
          style="max-width: 100%; height: auto"
        />
        <figcaption>Jack J97 tại một sự kiện âm nhạc</figcaption>
      </figure>

      <figure>
        <img
          src="jack3.jpg"
          alt="Poster âm nhạc của Jack J97"
          loading="lazy"
          style="max-width: 100%; height: auto"
        />
        <figcaption>Poster quảng bá sản phẩm âm nhạc mới</figcaption>
      </figure>
    </section>

    <hr />

    <section>
      <h2>Video Concert của Jack J97</h2>

      <video
        controls
        poster="video-thumbnail.jpg"
        style="max-width: 100%; height: auto"
        width="600"
      >
        <source src="jack-video.mp4" type="video/mp4" />
        <source src="jack-video.webm" type="video/webm" />
      </video>
    </section>

    <hr />

    <section>
      <h2>Recommend (Nhúng)</h2>

      <iframe
        width="710"
        height="399"
        src="https://www.youtube.com/embed/OrDB4jpA1g8?list=RDOrDB4jpA1g8"
        title="JACK - J97 | THIÊN LÝ ƠI | Official Music Video"
        frameborder="0"
        allow="
          accelerometer;
          autoplay;
          clipboard-write;
          encrypted-media;
          gyroscope;
          picture-in-picture;
          web-share;
        "
        referrerpolicy="strict-origin-when-cross-origin"
        allowfullscreen
      ></iframe>
    </section>
  </body>
</html>
